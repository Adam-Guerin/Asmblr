name: Multi-Architecture Build Matrix

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: asmblr/asmblr

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.changes.outputs.api-gateway }}
      asmblr-core: ${{ steps.changes.outputs.asmblr-core }}
      asmblr-agents: ${{ steps.changes.outputs.asmblr-agents }}
      asmblr-media: ${{ steps.changes.outputs.asmblr-media }}
      docker-base: ${{ steps.changes.outputs.docker-base }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Check for file changes
      uses: dorny/paths-filter@v2
      id: changes
      with:
        filters: |
          api-gateway:
            - 'api-gateway/**'
            - '.github/workflows/build-matrix.yml'
          asmblr-core:
            - 'asmblr-core/**'
            - '.github/workflows/build-matrix.yml'
          asmblr-agents:
            - 'asmblr-agents/**'
            - '.github/workflows/build-matrix.yml'
          asmblr-media:
            - 'asmblr-media/**'
            - '.github/workflows/build-matrix.yml'
          docker-base:
            - 'Dockerfile*'
            - 'requirements*.txt'
            - 'pyproject.toml'
            - '.github/workflows/build-matrix.yml'

  build-base:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docker-base == 'true'
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        platforms: linux/amd64,linux/arm64

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push base image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=base
        cache-to: type=gha,mode=max,scope=base
        outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base,push=true

  build-services:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-base]
    strategy:
      matrix:
        service: [api-gateway, asmblr-core, asmblr-agents, asmblr-media]
        fail-fast: false
    if: needs.detect-changes.outputs[matrix.service] == 'true'
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        platforms: linux/amd64,linux/arm64

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push ${{ matrix.service }} image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./${{ matrix.service }}/Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          BASE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-base@${{ needs.build-base.outputs.image-digest }}
        cache-from: type=gha,scope=${{ matrix.service }}
        cache-to: type=gha,mode=max,scope=${{ matrix.service }}
        outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }},push=true

  security-scan:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-services]
    if: always() && (needs.build-services.result == 'success' || needs.build-services.result == 'skipped')
    strategy:
      matrix:
        service: [api-gateway, asmblr-core, asmblr-agents, asmblr-media]
        fail-fast: false
    if: needs.detect-changes.outputs[matrix.service] == 'true'
    steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:latest
        format: 'sarif'
        output: 'trivy-results-${{ matrix.service }}.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results-${{ matrix.service }}.sarif'

  performance-test:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-services]
    if: always() && needs.build-services.result == 'success'
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Compose
      run: |
        sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose

    - name: Create performance test environment
      run: |
        cp docker-compose.optimized.yml docker-compose.test.yml
        # Update image tags to use newly built images
        sed -i 's|asmblr/asmblr-|${{ env.REGISTRY }}/asmblr-|g' docker-compose.test.yml
        sed -i 's|:latest|:main-${{ github.sha }}|g' docker-compose.test.yml

    - name: Start services
      run: |
        docker-compose -f docker-compose.test.yml up -d
        sleep 60  # Wait for services to be ready

    - name: Run performance tests
      run: |
        # Install k6
        sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6
        
        # Run load tests
        k6 run --out json=performance-results.json tests/performance/load-test.js

    - name: Stop services
      if: always()
      run: |
        docker-compose -f docker-compose.test.yml down

    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: performance-results-${{ github.sha }}
        path: |
          performance-results.json
          docker-compose.test.yml

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-services, security-scan, performance-test]
    if: github.ref == 'refs/heads/develop' && success()
    environment: staging
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Deploy to staging
      run: |
        echo "🚀 Deploying to staging with multi-arch images..."
        # Update staging docker-compose with new image tags
        sed -i 's|asmblr/asmblr-|${{ env.REGISTRY }}/asmblr-|g' docker-compose.staging.yml
        sed -i 's|:latest|:develop-${{ github.sha }}|g' docker-compose.staging.yml
        
        # Deploy
        docker-compose -f docker-compose.staging.yml up -d
        
        # Wait for health checks
        timeout 300 bash -c 'until curl -f http://localhost:8000/health; do sleep 5; done'
        
        echo "✅ Staging deployment successful!"

    - name: Run smoke tests
      run: |
        python -m pytest tests/smoke/ -v --tb=short

  deploy-production:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-services, security-scan, performance-test]
    if: github.ref == 'refs/heads/main' && success()
    environment: production
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Deploy to production (Blue-Green)
      run: |
        echo "🚀 Starting blue-green deployment..."
        
        # Create production environment file
        cat > .env.production << EOF
        ASMblr_PASSWORD=${{ secrets.ASMBLR_PASSWORD }}
        SECRET_KEY=${{ secrets.SECRET_KEY }}
        REPLICATION_PASSWORD=${{ secrets.REPLICATION_PASSWORD }}
        GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}
        S3_BUCKET=${{ secrets.S3_BUCKET }}
        AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
        EOF
        
        # Blue-green deployment logic
        ./scripts/blue-green-deploy.sh production ${{ github.sha }}
        
        echo "✅ Production deployment successful!"

    - name: Run production health checks
      run: |
        ./scripts/health-check-production.sh

    - name: Setup rollback on failure
      if: failure()
      run: |
        echo "❌ Production deployment failed! Initiating rollback..."
        ./scripts/rollback-production.sh
        exit 1

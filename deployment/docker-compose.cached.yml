# Optimized Docker Compose with advanced caching and resource limits
# Uses cached Dockerfile for faster builds and smaller images

version: "3.9"

services:
  # Ollama Service with optimized settings
  ollama:
    image: ollama/ollama:latest
    container_name: asmblr-ollama
    mem_limit: 6g
    cpus: "3.0"
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - ./scripts:/app/scripts:ro
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MAX_LOADED_MODELS=3
      - OLLAMA_NUM_PARALLEL=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - asmblr-network

  # Redis Service with memory optimization
  redis:
    image: redis:7-alpine
    container_name: asmblr-redis
    mem_limit: 512m
    cpus: "0.5"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
      - ./configs/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - asmblr-network

  # Main API Service with cached build
  api:
    build:
      context: .
      dockerfile: Dockerfile.cached
      target: production
      cache_from:
        - asmblr/asmblr-api:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: asmblr/asmblr-api:cached
    container_name: asmblr-api
    mem_limit: 4g
    cpus: "2.0"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./runs:/app/runs
      - ./data:/app/data
      - ./logs:/app/logs
      - ./configs:/app/configs:ro
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - RUN_MAX_CONCURRENT=5
      - WORKER_CONCURRENCY=3
      - API_CONCURRENCY=10
      - UVICORN_WORKERS=2
      - LOG_LEVEL=INFO
      - LOG_JSON=true
      - ENVIRONMENT=production
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - asmblr-network
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'

  # Streamlit UI Service with cached build
  ui:
    build:
      context: .
      dockerfile: Dockerfile.cached
      target: production
      cache_from:
        - asmblr/asmblr-ui:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: asmblr/asmblr-ui:cached
    container_name: asmblr-ui
    mem_limit: 1g
    cpus: "0.5"
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./runs:/app/runs:ro
      - ./data:/app/data:ro
      - ./configs:/app/configs:ro
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - LOG_JSON=true
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    command: ["streamlit", "run", "app/ui.py", "--server.port", "8501", "--server.address", "0.0.0.0", "--server.headless", "true"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - asmblr-network

  # Worker Service with cached build
  worker:
    build:
      context: .
      dockerfile: Dockerfile.cached
      target: production
      cache_from:
        - asmblr/asmblr-worker:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: asmblr/asmblr-worker:cached
    container_name: asmblr-worker
    mem_limit: 6g
    cpus: "3.0"
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./runs:/app/runs
      - ./data:/app/data
      - ./logs:/app/logs
      - ./configs:/app/configs:ro
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - WORKER_PORT=8001
      - RUN_MAX_CONCURRENT=5
      - WORKER_CONCURRENCY=3
      - ASYNC_WORKERS=4
      - ENABLE_ASYNC_TASKS=true
      - LOG_LEVEL=INFO
      - LOG_JSON=true
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - asmblr-network
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '3.0'
        reservations:
          memory: 3G
          cpus: '1.5'

  # Nginx reverse proxy with caching
  nginx:
    image: nginx:alpine
    container_name: asmblr-nginx
    mem_limit: 256m
    cpus: "0.25"
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs/nginx-cache.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - ui
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - asmblr-network

  # Prometheus monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: asmblr-prometheus
    mem_limit: 512m
    cpus: "0.5"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - asmblr-network

  # Grafana dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: asmblr-grafana
    mem_limit: 256m
    cpus: "0.25"
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - asmblr-network

# Networks
networks:
  asmblr-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Volumes with optimized settings
volumes:
  ollama_models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/ollama
  
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis
  
  prometheus_data:
    driver: local
  
  grafana_data:
    driver: local
  
  nginx_cache:
    driver: local
  
  nginx_logs:
    driver: local

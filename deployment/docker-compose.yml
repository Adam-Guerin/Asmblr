version: "3.9"
services:
  ollama:
    image: ollama/ollama:latest
    mem_limit: 8g
    cpus: "4.0"
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  redis:
    image: redis:7-alpine
    mem_limit: 512m
    cpus: "0.5"
    ports:
      - "127.0.0.1:6379:6379"

  api:
    build: .
    mem_limit: 4g
    cpus: "2.0"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - RUN_MAX_CONCURRENT=5
      - WORKER_CONCURRENCY=3
      - API_CONCURRENCY=10
      - UVICORN_WORKERS=2
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./runs:/app/runs
      - ./data:/app/data
    depends_on:
      - ollama
      - redis
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2", "--backlog", "2048"]

  ui:
    build: .
    mem_limit: 1g
    cpus: "0.5"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./runs:/app/runs
      - ./data:/app/data
    depends_on:
      - api
    command: ["streamlit", "run", "app/ui.py", "--server.port", "8501", "--server.address", "0.0.0.0"]

  worker:
    build: .
    mem_limit: 6g
    cpus: "3.0"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - WORKER_PORT=8001
      - RUN_MAX_CONCURRENT=5
      - WORKER_CONCURRENCY=3
      - ASYNC_WORKERS=4
      - ENABLE_ASYNC_TASKS=true
    volumes:
      - ./runs:/app/runs
      - ./data:/app/data
    depends_on:
      - redis
      - ollama
    command: ["python", "-m", "app.worker"]
    ports:
      - "127.0.0.1:8001:8001"

volumes:
  ollama_models:

# Optimized Docker Compose for Asmblr
# Uses multi-stage builds and resource optimization

version: "3.9"

services:
  # Ollama Service
  ollama:
    image: ollama/ollama:latest
    container_name: asmblr-ollama
    mem_limit: 6g
    cpus: "3.0"
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: asmblr-redis
    mem_limit: 512m
    cpus: "0.5"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Main API Service (Lightweight)
  api:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: lightweight
    container_name: asmblr-api
    mem_limit: 1g
    cpus: "1.0"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./runs:/app/runs
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./data/app.db
      - LOG_JSON=true
      - ENABLE_MONITORING=true
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Streamlit UI Service
  ui:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: lightweight
    container_name: asmblr-ui
    mem_limit: 512m
    cpus: "0.5"
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./runs:/app/runs
      - ./data:/app/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    command: ["streamlit", "run", "app/ui.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Background Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: lightweight
    container_name: asmblr-worker
    mem_limit: 1g
    cpus: "1.0"
    volumes:
      - ./runs:/app/runs
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./data/app.db
      - WORKER_MODE=true
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Monitoring Stack (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: asmblr-prometheus
    mem_limit: 512m
    cpus: "0.5"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus-optimized.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:latest
    container_name: asmblr-grafana
    mem_limit: 256m
    cpus: "0.3"
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    restart: unless-stopped
    profiles: ["monitoring"]

  # Backup Service
  backup:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: lightweight
    container_name: asmblr-backup
    mem_limit: 256m
    cpus: "0.3"
    volumes:
      - ./runs:/app/runs:ro
      - ./data:/app/data:ro
      - ./backups:/app/backups
      - ./scripts:/app/scripts
    environment:
      - BACKUP_DIR=/app/backups
      - DATA_DIR=/app/data
      - RUNS_DIR=/app/runs
    command: ["python", "/app/scripts/backup-service.py", "schedule"]
    restart: unless-stopped
    profiles: ["backup"]

volumes:
  ollama_models:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

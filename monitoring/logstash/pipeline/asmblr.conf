# Pipeline Logstash pour les logs Asmblr
input {
  beats {
    port => 5044
  }
}

# Filtres pour traiter les logs Asmblr
filter {
  # Parser les logs JSON de l'application
  if [message] {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Extraire les métadonnées du smart logger
  if [parsed] and [parsed][category] {
    mutate {
      add_field => { "service" => "asmblr" }
      add_field => { "component" => "%{[parsed][category]}" }
      add_field => { "level" => "%{[parsed][level]}" }
    }
  }

  # Extraire les informations de tracing
  if [parsed] and [parsed][trace_id] {
    mutate {
      add_field => { "trace_id" => "%{[parsed][trace_id]}" }
    }
  }

  # Traiter les logs d'erreurs
  if [parsed] and [parsed][level] == "ERROR" {
    mutate {
      add_tag => [ "error" ]
    }
  }

  # Traiter les logs de performance
  if [parsed] and [parsed][category] == "PERFORMANCE" {
    mutate {
      add_tag => [ "performance" ]
    }
  }

  # Nettoyer les champs
  mutate {
    remove_field => [ "host", "agent", "ecs", "input", "log" ]
  }

  # Ajouter timestamp si manquant
  if ![timestamp] {
    mutate {
      add_field => { "@timestamp" => "%{@timestamp}" }
    }
  }
}

# Sortie vers Elasticsearch
output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "asmblr-logs-%{+YYYY.MM.dd}"
    template_name => "asmblr"
    template_pattern => "asmblr-logs-*"
    template => {
      "index_patterns" => ["asmblr-logs-*"],
      "settings" => {
        "number_of_shards" => 1,
        "number_of_replicas" => 0,
        "index.refresh_interval" => "5s"
      },
      "mappings" => {
        "properties" => {
          "@timestamp" => { "type" => "date" },
          "level" => { "type" => "keyword" },
          "message" => { "type" => "text", "analyzer" => "standard" },
          "service" => { "type" => "keyword" },
          "component" => { "type" => "keyword" },
          "trace_id" => { "type" => "keyword" },
          "span_id" => { "type" => "keyword" },
          "user_id" => { "type" => "keyword" },
          "request_id" => { "type" => "keyword" },
          "error" => {
            "properties" => {
              "type" => { "type" => "keyword" },
              "message" => { "type" => "text" },
              "stack_trace" => { "type" => "text" }
            }
          },
          "labels" => { "type" => "object" },
          "metrics" => { "type" => "object" }
        }
      }
    }
  }
}

# Logs de debugging
output {
  stdout {
    codec => rubydebug
  }
}

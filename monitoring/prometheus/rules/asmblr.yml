# Règles d'alerting Prometheus pour Asmblr

groups:
  - name: asmblr.rules
    rules:
      # Alertes de disponibilité
      - alert: AsmblrServiceDown
        expr: up{job=~"asmblr.*"} == 0
        for: 1m
        labels:
          severity: critical
          service: asmblr
        annotations:
          summary: "Service Asmblr indisponible"
          description: "Le service {{ $labels.job }} est indisponible depuis plus d'une minute."

      - alert: AsmblrHighErrorRate
        expr: rate(asmblr_requests_total{status=~"5.."}[5m]) / rate(asmblr_requests_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: asmblr
        annotations:
          summary: "Taux d'erreur élevé"
          description: "Le taux d'erreur est de {{ $value | humanizePercentage }} depuis plus de 2 minutes."

      - alert: AsmblrVeryHighErrorRate
        expr: rate(asmblr_requests_total{status=~"5.."}[5m]) / rate(asmblr_requests_total[5m]) > 0.3
        for: 1m
        labels:
          severity: critical
          service: asmblr
        annotations:
          summary: "Taux d'erreur critique"
          description: "Le taux d'erreur est de {{ $value | humanizePercentage }} depuis plus d'une minute."

      # Alertes de performance
      - alert: AsmblrHighLatency
        expr: histogram_quantile(0.95, rate(asmblr_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: asmblr
        annotations:
          summary: "Latence élevée"
          description: "Le 95ème percentile de latence est de {{ $value }}s depuis plus de 5 minutes."

      - alert: AsmblrVeryHighLatency
        expr: histogram_quantile(0.95, rate(asmblr_request_duration_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: critical
          service: asmblr
        annotations:
          summary: "Latence critique"
          description: "Le 95ème percentile de latence est de {{ $value }}s depuis plus de 2 minutes."

      # Alertes de pipelines
      - alert: AsmblrPipelineFailure
        expr: rate(asmblr_pipeline_runs_total{status="failed"}[5m]) > 0.2
        for: 3m
        labels:
          severity: warning
          service: asmblr
        annotations:
          summary: "Échecs de pipelines"
          description: "{{ $value | humanizePercentage }} des pipelines échouent depuis plus de 3 minutes."

      - alert: AsmblrNoPipelineRuns
        expr: increase(asmblr_pipeline_runs_total[10m]) == 0
        for: 15m
        labels:
          severity: warning
          service: asmblr
        annotations:
          summary: "Aucune pipeline exécutée"
          description: "Aucune pipeline n'a été exécutée depuis 15 minutes."

      # Alertes LLM
      - alert: AsmblrLLMHighLatency
        expr: histogram_quantile(0.95, rate(asmblr_llm_response_time_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
          service: asmblr
        annotations:
          summary: "Latence LLM élevée"
          description: "Le 95ème percentile de latence LLM est de {{ $value }}s depuis plus de 5 minutes."

      - alert: AsmblrLLMHighErrorRate
        expr: rate(asmblr_llm_requests_total{status="error"}[5m]) / rate(asmblr_llm_requests_total[5m]) > 0.2
        for: 3m
        labels:
          severity: warning
          service: asmblr
        annotations:
          summary: "Taux d'erreur LLM élevé"
          description: "Le taux d'erreur LLM est de {{ $value | humanizePercentage }} depuis plus de 3 minutes."

      # Alertes de cache
      - alert: AsmblrCacheLowHitRatio
        expr: asmblr_cache_hit_ratio < 0.7
        for: 10m
        labels:
          severity: warning
          service: asmblr
        annotations:
          summary: "Ratio de cache faible"
          description: "Le ratio de cache est de {{ $value | humanizePercentage }} depuis plus de 10 minutes."

      - alert: AsmblrCacheHighMemoryUsage
        expr: asmblr_cache_size_bytes / asmblr_cache_max_size_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: asmblr
        annotations:
          summary: "Utilisation mémoire du cache élevée"
          description: "Le cache utilise {{ $value | humanizePercentage }} de sa capacité maximale."

      # Alertes système
      - alert: AsmblrHighCPUUsage
        expr: asmblr_cpu_usage_percent > 80
        for: 5m
        labels:
          severity: warning
          service: asmblr
        annotations:
          summary: "Utilisation CPU élevée"
          description: "L'utilisation CPU est de {{ $value }}% depuis plus de 5 minutes."

      - alert: AsmblrVeryHighCPUUsage
        expr: asmblr_cpu_usage_percent > 95
        for: 2m
        labels:
          severity: critical
          service: asmblr
        annotations:
          summary: "Utilisation CPU critique"
          description: "L'utilisation CPU est de {{ $value }}% depuis plus de 2 minutes."

      - alert: AsmblrHighMemoryUsage
        expr: asmblr_memory_usage_bytes / asmblr_memory_total_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          service: asmblr
        annotations:
          summary: "Utilisation mémoire élevée"
          description: "L'utilisation mémoire est de {{ $value | humanizePercentage }} depuis plus de 5 minutes."

      - alert: AsmblrVeryHighMemoryUsage
        expr: asmblr_memory_usage_bytes / asmblr_memory_total_bytes > 0.95
        for: 2m
        labels:
          severity: critical
          service: asmblr
        annotations:
          summary: "Utilisation mémoire critique"
          description: "L'utilisation mémoire est de {{ $value | humanizePercentage }} depuis plus de 2 minutes."

      # Alertes de disque
      - alert: AsmblrLowDiskSpace
        expr: asmblr_disk_free_bytes / asmblr_disk_total_bytes < 0.2
        for: 10m
        labels:
          severity: warning
          service: asmblr
        annotations:
          summary: "Espace disque faible"
          description: "Il ne reste que {{ $value | humanizePercentage }} d'espace disque disponible."

      - alert: AsmblrVeryLowDiskSpace
        expr: asmblr_disk_free_bytes / asmblr_disk_total_bytes < 0.1
        for: 5m
        labels:
          severity: critical
          service: asmblr
        annotations:
          summary: "Espace disque critique"
          description: "Il ne reste que {{ $value | humanizePercentage }} d'espace disque disponible."

      # Alertes d'activité
      - alert: AsmblrNoActiveUsers
        expr: asmblr_active_users{period="daily"} == 0
        for: 1h
        labels:
          severity: info
          service: asmblr
        annotations:
          summary: "Aucun utilisateur actif"
          description: "Aucun utilisateur actif détecté depuis 1 heure."

      - alert: AsmblrLowActivity
        expr: rate(asmblr_requests_total[1h]) < 10
        for: 2h
        labels:
          severity: info
          service: asmblr
        annotations:
          summary: "Activité faible"
          description: "Moins de 10 requêtes par heure depuis 2 heures."

  - name: asmblr.business.rules
    rules:
      # Alertes métier
      - alert: AsmblrNoIdeasGenerated
        expr: increase(asmblr_ideas_generated_total[1h]) == 0
        for: 2h
        labels:
          severity: warning
          service: asmblr
          category: business
        annotations:
          summary: "Aucune idée générée"
          description: "Aucune idée n'a été générée depuis 2 heures."

      - alert: AsmblrLowIdeaGenerationRate
        expr: rate(asmblr_ideas_generated_total[1h]) < 1
        for: 1h
        labels:
          severity: info
          service: asmblr
          category: business
        annotations:
          summary: "Taux de génération d'idées faible"
          description: "Moins d'une idée par heure depuis 1 heure."

      - alert: AsmblrNoMVPBuilds
        expr: increase(asmblr_mvp_builds_total[4h]) == 0
        for: 6h
        labels:
          severity: warning
          service: asmblr
          category: business
        annotations:
          summary: "Aucun MVP construit"
          description: "Aucun MVP n'a été construit depuis 6 heures."

      - alert: AsmblrHighTokenUsage
        expr: rate(asmblr_llm_tokens_total[1h]) > 10000
        for: 30m
        labels:
          severity: warning
          service: asmblr
          category: business
        annotations:
          summary: "Utilisation de tokens élevée"
          description: "Plus de 10,000 tokens utilisés par heure depuis 30 minutes."

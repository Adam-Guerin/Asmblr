# Docker Compose pour Asmblr - Configuration Staging
# Version intermédiaire pour tests et validation avant production

version: "3.9"

services:
  # Load Balancer (Nginx)
  nginx:
    image: nginx:alpine
    mem_limit: 512m
    cpus: "0.5"
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/staging-nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - asmblr-staging-network
    restart: unless-stopped
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway (Instance unique pour staging)
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    mem_limit: 1g
    cpus: "1.0"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://asmblr:${STAGING_ASMblr_PASSWORD}@postgres:5432/asmblr_staging
      - CORE_SERVICE_URL=http://asmblr-core:8001
      - AGENTS_SERVICE_URL=http://asmblr-agents:8002
      - MEDIA_SERVICE_URL=http://asmblr-media:8003
      - SERVICE_NAME=api-gateway-staging
      - LOG_LEVEL=DEBUG
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW=60
      - ENABLE_SECURITY=true
      - ENVIRONMENT=staging
    networks:
      - asmblr-staging-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8000:8000"

  # Core Service
  asmblr-core:
    build:
      context: ./asmblr-core
      dockerfile: Dockerfile
    mem_limit: 2g
    cpus: "2.0"
    environment:
      - DATABASE_URL=postgresql://asmblr:${STAGING_ASMblr_PASSWORD}@postgres:5432/asmblr_staging
      - REDIS_URL=redis://redis:6379/1
      - SERVICE_NAME=asmblr-core-staging
      - LOG_LEVEL=DEBUG
      - ENABLE_MONITORING=true
      - ENVIRONMENT=staging
    volumes:
      - core_staging_data:/app/data
      - ./logs/core:/app/logs
    networks:
      - asmblr-staging-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8001:8001"

  # Agents Service
  asmblr-agents:
    build:
      context: ./asmblr-agents
      dockerfile: Dockerfile
    mem_limit: 4g
    cpus: "3.0"
    environment:
      - DATABASE_URL=postgresql://asmblr:${STAGING_ASMblr_PASSWORD}@postgres:5432/asmblr_staging
      - REDIS_URL=redis://redis:6379/2
      - OLLAMA_BASE_URL=http://ollama:11434
      - SERVICE_NAME=asmblr-agents-staging
      - LOG_LEVEL=DEBUG
      - CREWAI_MAX_WORKERS=2
      - ENABLE_MONITORING=true
      - ENVIRONMENT=staging
    volumes:
      - agents_staging_data:/app/data
      - ./logs/agents:/app/logs
    networks:
      - asmblr-staging-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8002:8002"

  # Media Service
  asmblr-media:
    build:
      context: ./asmblr-media
      dockerfile: Dockerfile
    mem_limit: 2g
    cpus: "2.0"
    environment:
      - DATABASE_URL=postgresql://asmblr:${STAGING_ASMblr_PASSWORD}@postgres:5432/asmblr_staging
      - REDIS_URL=redis://redis:6379/3
      - SERVICE_NAME=asmblr-media-staging
      - LOG_LEVEL=DEBUG
      - MEDIA_STORAGE_PATH=/app/media
      - ENABLE_MONITORING=true
      - ENVIRONMENT=staging
    volumes:
      - media_staging_storage:/app/media
      - media_staging_data:/app/data
      - ./logs/media:/app/logs
    networks:
      - asmblr-staging-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8003:8003"

  # PostgreSQL (Instance unique pour staging)
  postgres:
    image: postgres:15-alpine
    mem_limit: 2g
    cpus: "1.0"
    environment:
      - POSTGRES_DB=asmblr_staging
      - POSTGRES_USER=asmblr
      - POSTGRES_PASSWORD=${STAGING_ASMblr_PASSWORD}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./scripts/init-staging-db.sql:/docker-entrypoint-initdb.d/init-staging-db.sql
    networks:
      - asmblr-staging-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asmblr"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "5432:5432"

  # Redis
  redis:
    image: redis:7-alpine
    mem_limit: 512m
    cpus: "0.5"
    volumes:
      - redis_staging_data:/data
      - ./redis/staging-redis.conf:/etc/redis/redis.conf
    networks:
      - asmblr-staging-network
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "6379:6379"

  # Ollama (Instance réduite pour staging)
  ollama:
    image: ollama/ollama:latest
    mem_limit: 4g
    cpus: "2.0"
    volumes:
      - ollama_staging_data:/root/.ollama
    networks:
      - asmblr-staging-network
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
    command: serve
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "11434:11434"

  # Monitoring Stack (Version réduite pour staging)
  prometheus:
    image: prom/prometheus:latest
    mem_limit: 512m
    cpus: "0.5"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus-staging.yml:/etc/prometheus/prometheus.yml
      - prometheus_staging_data:/prometheus
    networks:
      - asmblr-staging-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    mem_limit: 512m
    cpus: "0.5"
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${STAGING_GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_staging_data:/var/lib/grafana
      - ./monitoring/grafana/staging-dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/staging-datasources:/etc/grafana/provisioning/datasources
    networks:
      - asmblr-staging-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # Test Runner pour les tests E2E
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    mem_limit: 1g
    cpus: "1.0"
    environment:
      - TEST_ENVIRONMENT=staging
      - API_BASE_URL=http://api-gateway:8000
      - UI_BASE_URL=http://nginx:8080
      - DATABASE_URL=postgresql://asmblr:${STAGING_ASMblr_PASSWORD}@postgres:5432/asmblr_staging
    volumes:
      - ./tests:/app/tests
      - ./test-results:/app/test-results
    networks:
      - asmblr-staging-network
    depends_on:
      - api-gateway
      - asmblr-core
      - asmblr-agents
      - asmblr-media
    command: ["python", "-m", "pytest", "tests/e2e/", "-v", "--html=test-results/e2e-report.html"]

networks:
  asmblr-staging-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  # Database volumes
  postgres_staging_data:
    driver: local
  
  # Cache volumes
  redis_staging_data:
    driver: local
  
  # Application volumes
  core_staging_data:
    driver: local
  agents_staging_data:
    driver: local
  media_staging_data:
    driver: local
  media_staging_storage:
    driver: local
  
  # AI/LLM volumes
  ollama_staging_data:
    driver: local
  
  # Monitoring volumes
  prometheus_staging_data:
    driver: local
  grafana_staging_data:
    driver: local

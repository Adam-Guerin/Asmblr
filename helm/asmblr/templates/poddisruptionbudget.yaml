{{- if .Values.security.podDisruptionBudget.enabled }}
{{- range $service := list "api" "worker" "ui" "gateway" }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "asmblr.fullname" $ }}-{{ $service }}-pdb
  labels:
    {{- include "asmblr.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $service }}
spec:
  minAvailable: {{ .Values.security.podDisruptionBudget.minAvailable | default 1 }}
  selector:
    matchLabels:
      {{- include "asmblr.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $service }}
{{- end }}
{{- end }}

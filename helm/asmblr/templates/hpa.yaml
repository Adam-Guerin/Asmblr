{{- if .Values.autoscaling.enabled }}
{{- range $service := list "api" "worker" "ui" }}
{{- $config := index .Values.autoscaling $service }}
{{- if $config }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "asmblr.fullname" $ }}-{{ $service }}
  labels:
    {{- include "asmblr.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $service }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "asmblr.fullname" $ }}-{{ $service }}
  minReplicas: {{ $config.minReplicas }}
  maxReplicas: {{ $config.maxReplicas }}
  metrics:
  {{- if $config.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ $config.targetCPUUtilizationPercentage }}
  {{- end }}
  {{- if $config.targetMemoryUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ $config.targetMemoryUtilizationPercentage }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}

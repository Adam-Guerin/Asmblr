
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Asmblr AI Platform - Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #F8F9FA, #e3f2fd);
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        .campaign-title {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .scene {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .scene-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #FFFFFF;
        }
        .logo {
            max-width: 200px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .timeline {
            border-left: 4px solid #FFC107;
            padding-left: 15px;
            margin: 10px 0;
        }
        .timeline-item {
            margin-bottom: 10px;
            position: relative;
        }
        .timeline-content {
            font-weight: bold;
            color: #FFFFFF;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="campaign-title">Asmblr AI Platform</h1>
        <p>Campagne pour Tech Companies</p>
        <p>Durée totale: 4.5s</p>
    </div>
    
    <div class="scene">
        <h2 class="scene-title">Logo Principal</h2>
        <img src="assets/logo.png" alt="Logo" class="logo">
    </div>
    
    <div class="timeline">
        <h2>Timeline de la Campagne</h2>

        <div class="timeline-item">
            <div class="timeline-content">
                <div>logo_intro</div>
                <div>0.0s - 2.0s</div>
            </div>
        </div>

        <div class="timeline-item">
            <div class="timeline-content">
                <div>text_innovation</div>
                <div>2.0s - 3.5s</div>
            </div>
        </div>

        <div class="timeline-item">
            <div class="timeline-content">
                <div>call_to_action</div>
                <div>3.5s - 4.5s</div>
            </div>
        </div>

    </div>
    
    <div style="text-align: center; margin-top: 30px;">
        <button style="background: {brand_colors['primary']}; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">
            Lancer la Campagne
        </button>
    </div>
</body>
</html>
